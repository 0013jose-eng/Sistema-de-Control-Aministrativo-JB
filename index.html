<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sistema de Control Administrativo JB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --bg: #14213d; --accent: #00f2ff; --ok: #238636;
  --tileblue: #1b3fa6; --tilepink: #b1256a; --tilegreen: #0ca492;
  --tileorange: #ea960e; --tile-gray: #1a2228; --futurist-glass: rgba(25,44,74,0.43);
}
html, body { height:100%; min-width:100vw; margin:0; padding:0; overflow:hidden;}
body { background:var(--bg); color:white; font-family:'Segoe UI',Arial,sans-serif; display:flex; align-items:center; justify-content:center; }

.screen { display: none; width:100vw; height:100vh; justify-content:center; align-items:center; position: absolute; top:0; left:0;}
.active { display: flex !important; animation:fadeIn 0.7s;}

/* LOGIN CARD */
.login-card {
  width:480px; max-width:95vw; background:rgba(13,17,23,0.95); padding:40px; 
  border-radius:14px; border:1.5px solid #00f2ff2d; box-shadow:0 0 30px #00f2ff10;
  backdrop-filter:blur(20px); display:flex; align-items:center; gap:30px;
}
.avatar-box {
  width:110px; height:110px; border:2px solid #30363d; border-radius:10px; 
  overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000;
}
.avatar-box img { width:100%; height:100%; object-fit:cover; }

#ia-msj {
  border:1px solid var(--accent); padding:12px; border-radius:7px; font-size:.93rem; 
  margin-bottom:13px; min-height:39px; display:flex; align-items:center; background:rgba(0,242,255,0.06);
}

input, select {
  width:100%; padding:12px; background:rgba(0,0,0,0.5); color:white; border:1px solid #333; 
  border-radius:5px; margin-bottom:12px; box-sizing:border-box; outline:none; transition:0.3s;
}
input:focus { border-color:var(--accent); }
.hidden { display:none !important; }

/* WELCOME & PANEL */
.welcome-screen { flex-direction:column; text-align:center; }
#panel-futurista { 
  display:none; flex-direction:column; width:100vw; height:100vh; 
  background:linear-gradient(120deg,#16263f 30%,#2f445c 100%); padding-top:50px;
}
.panel-header { color:var(--accent); text-align:center; font-size:2.1rem; font-weight:900; margin-bottom:30px; }

.tiles-row { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
.tile {
  min-width:180px; padding:25px; border-radius:25px; background:var(--futurist-glass);
  border:2px solid #00f2ff40; transition:0.3s; cursor:pointer; text-align:center;
}
.tile:hover { transform:scale(1.05); box-shadow:0 0 20px var(--accent); }
.tile-blue { background:var(--tileblue); }
.tile-pink { background:var(--tilepink); }
.tile-green { background:var(--tilegreen); }
.tile-orange { background:var(--tileorange); }

/* CLOCK */
#corner-clock-wrap {
  position:fixed; top:20px; right:20px; z-index:100; display:none; flex-direction:column; align-items:center;
}
#corner-clock {
  width:140px; height:140px; border-radius:50%; border:3px solid var(--accent); position:relative;
  background:rgba(0,0,0,0.4); box-shadow:0 0 15px var(--accent);
}
.clock-needle { position:absolute; left:50%; top:50%; transform-origin:50% 100%; transform:translate(-50%,-100%); }
.clock-hour { width:8px; height:40px; background:#fff; }
.clock-min { width:5px; height:60px; background:var(--accent); }
.clock-sec { width:2px; height:70px; background:#ff0055; }

/* CHAT SUPPORT */
#chat-window {
  position:fixed; bottom:20px; right:20px; width:350px; height:400px; 
  background:#0d1117; border:1px solid var(--accent); border-radius:10px; 
  display:none; flex-direction:column; z-index:200;
}
.chat-messages { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; }
.msg { padding:10px; border-radius:8px; margin-bottom:10px; max-width:80%; }
.msg.it { background:#21262d; align-self:flex-start; border-left:3px solid var(--accent); }
.msg.user { background:#0078d7; align-self:flex-end; }

@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>

<audio id="cuckoo-audio" src="https://cdn.pixabay.com/audio/2022/10/16/audio_12f5e8c165.mp3"></audio>
<audio id="tick-audio" src="https://cdn.pixabay.com/audio/2022/03/15/audio_117c47b946.mp3" loop></audio>

<div style="position:fixed; top:10px; left:10px; z-index:1000;">
  <select id="lang-select" onchange="changeLang(this.value)">
    <option value="es">Español</option>
    <option value="en">English</option>
  </select>
</div>

<section id="screen-login" class="screen active">
  <div class="login-card">
    <div class="avatar-box">
      <i class="fa-solid fa-robot" id="robot-icon" style="font-size:4rem; color:#0078d7;"></i>
      <img id="user-photo" src="https://i.imgur.com/8Km9tLL.png" class="hidden">
    </div>
    <div style="flex:1;">
      <h2 id="system-title">SYSTEM JABM</h2>
      <div id="ia-msj">IA: Esperando identificación...</div>
      <input type="text" id="user-input" oninput="validateUser()" placeholder="ID de Usuario">
      <div id="pin-area" class="hidden">
        <input type="password" id="pin-input" maxlength="6" oninput="validatePIN()" placeholder="PIN">
      </div>
    </div>
  </div>
</section>

<section id="screen-welcome" class="screen welcome-screen">
  <h1 id="welcome-title"></h1>
  <div id="ia-assistant"></div>
  <button id="btn-manos" onclick="goToPanel()" style="margin-top:20px; padding:15px 30px; border-radius:30px; border:none; background:var(--accent); font-weight:bold; cursor:pointer;">MANOS A LA OBRA</button>
</section>

<section id="panel-futurista" class="screen">
  <div class="panel-header" id="panel-header">SISTEMA CONTROL JB</div>
  <div class="tiles-row">
    <div class="tile tile-blue"><i class="fa-solid fa-clock"></i><p id="t-alm">Almuerzo</p><span>12:30</span></div>
    <div class="tile tile-green"><i class="fa-solid fa-door-open"></i><p id="t-sal">Salida</p><span>18:00</span></div>
    <div class="tile tile-pink"><i class="fa-solid fa-cake-candles"></i><p id="t-cum">Cumpleaños</p><span id="val-cum">Juan P.</span></div>
    <div class="tile tile-orange" onclick="openChat()"><i class="fa-solid fa-headset"></i><p id="t-ia">Soporte</p><span>Chat</span></div>
  </div>
  <div class="ia-panel-chat-box" id="ia-panel-chat">
    <div class="msg it">Sistema iniciado correctamente.</div>
  </div>
</section>

<div id="corner-clock-wrap">
  <div id="corner-clock">
    <div class="clock-hour clock-needle"></div>
    <div class="clock-min clock-needle"></div>
    <div class="clock-sec clock-needle"></div>
  </div>
  <div id="clock-date" style="margin-top:10px;"></div>
</div>

<div id="chat-window">
  <div style="background:var(--accent); color:black; padding:10px; display:flex; justify-content:space-between;">
    <span>SOPORTE IT</span>
    <i class="fa-solid fa-xmark" onclick="closeChat()" style="cursor:pointer;"></i>
  </div>
  <div class="chat-messages" id="chat-box"></div>
  <div style="padding:10px; display:flex;">
    <input type="text" id="chat-input" style="margin:0; flex:1;">
    <button onclick="sendMessage()" style="background:var(--accent); border:none; padding:10px;">OK</button>
  </div>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script src="https://js.pusher.com/beams/1.0/push-notifications-cdn.js"></script>

<script>
// CONFIGURACIÓN PUSHER
const PUSHER_CONF = { 
  key: '53c3a868a60419e3eeb8', 
  cluster: 'us2', 
  instanceId: '18fa1dad-9452-4f95-b3bf-fb450a684e8a' 
};

const DB = { user: "JBaltodano_Admin", pin: "404471", name: "Jose Alfredo" };
let currentLang = "es";

const i18n = {
  es: { welcome: "¡Bienvenido, Jose!", recognized: "IA: Usuario reconocido. PIN requerido.", system: "SISTEMA CONTROL JB" },
  en: { welcome: "Welcome, Jose!", recognized: "AI: User recognized. PIN required.", system: "JB CONTROL SYSTEM" }
};

window.onload = () => { tickClock(); initPusher(); };

function initPusher() {
  const pusher = new Pusher(PUSHER_CONF.key, { cluster: PUSHER_CONF.cluster });
  const channel = pusher.subscribe('chat-empresarial');
  channel.bind('nuevo-mensaje', (data) => {
    document.getElementById('ia-panel-chat').innerHTML += `<div class="msg it"><b>${data.usuario}:</b> ${data.texto}</div>`;
  });

  if (typeof PusherBeams !== 'undefined') {
    const beamsClient = new PusherBeams.WebClient({ instanceId: PUSHER_CONF.instanceId });
    beamsClient.start().then(() => beamsClient.addDeviceInterest('global')).catch(console.error);
  }
}

function validateUser() {
  const val = document.getElementById('user-input').value;
  if(val === DB.user) {
    document.getElementById('user-input').classList.add('hidden');
    document.getElementById('pin-area').classList.remove('hidden');
    document.getElementById('ia-msj').innerText = i18n[currentLang].recognized;
    document.getElementById('robot-icon').classList.add('hidden');
    document.getElementById('user-photo').classList.remove('hidden');
  }
}

function validatePIN() {
  if(document.getElementById('pin-input').value === DB.pin) {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-welcome').classList.add('active');
    document.getElementById('welcome-title').innerText = i18n[currentLang].welcome;
    document.getElementById('tick-audio').play();
  }
}

function goToPanel() {
  document.getElementById('screen-welcome').classList.remove('active');
  document.getElementById('panel-futurista').classList.add('active');
  document.getElementById('corner-clock-wrap').style.display = "flex";
}

function tickClock() {
  const now = new Date();
  const h = now.getHours() % 12;
  const m = now.getMinutes();
  const s = now.getSeconds();
  
  document.querySelector('.clock-hour').style.transform = `translate(-50%,-100%) rotate(${(h+(m/60))*30}deg)`;
  document.querySelector('.clock-min').style.transform = `translate(-50%,-100%) rotate(${(m+(s/60))*6}deg)`;
  document.querySelector('.clock-sec').style.transform = `translate(-50%,-100%) rotate(${s*6}deg)`;
  document.getElementById('clock-date').innerText = now.toLocaleDateString();
  
  if(m === 0 && s === 0) document.getElementById('cuckoo-audio').play();
  
  requestAnimationFrame(tickClock);
}

function changeLang(val) {
  currentLang = val;
  document.getElementById('system-title').innerText = i18n[val].system;
}

function openChat() { document.getElementById('chat-window').style.display = "flex"; }
function closeChat() { document.getElementById('chat-window').style.display = "none"; }

function sendMessage() {
  const input = document.getElementById('chat-input');
  if(input.value) {
    document.getElementById('chat-box').innerHTML += `<div class="msg user">${input.value}</div>`;
    input.value = "";
  }
}
</script>
</body>
</html>
